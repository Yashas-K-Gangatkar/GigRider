<!DOCTYPE html>
<html>
<head>
<style>
html { background: #1B2A4A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Georgia, serif;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background-image: url('cover-bg.png');
  background-size: cover;
  color: #FAF7F2;
}
.gold-line {
  width: 80pt; height: 2pt; background: #C9A96E;
  margin: 0 auto 18pt auto;
}
.top-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 4pt;
  background-image: url('gold-bar.png'); background-size: cover;
}
.bottom-accent {
  position: absolute; bottom: 0; left: 0; right: 0; height: 4pt;
  background-image: url('gold-bar.png'); background-size: cover;
}
.corner-tl { position: absolute; top: 20pt; left: 20pt; width: 40pt; height: 40pt; border-top: 2pt solid #C9A96E; border-left: 2pt solid #C9A96E; }
.corner-tr { position: absolute; top: 20pt; right: 20pt; width: 40pt; height: 40pt; border-top: 2pt solid #C9A96E; border-right: 2pt solid #C9A96E; }
.corner-bl { position: absolute; bottom: 20pt; left: 20pt; width: 40pt; height: 40pt; border-bottom: 2pt solid #C9A96E; border-left: 2pt solid #C9A96E; }
.corner-br { position: absolute; bottom: 20pt; right: 20pt; width: 40pt; height: 40pt; border-bottom: 2pt solid #C9A96E; border-right: 2pt solid #C9A96E; }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="bottom-accent"></div>
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

  <div class="gold-line"></div>
  <p style="font-size: 12pt; letter-spacing: 4pt; color: #C9A96E; margin: 0 0 24pt 0;">ONE APP &middot; EVERY PLATFORM &middot; MORE EARNINGS</p>
  <p style="font-size: 18pt; color: #D4BC8E; margin: 0 0 8pt 0;">Investor Presentation</p>
  <p style="font-size: 10pt; color: #7A9A8E; letter-spacing: 2pt; margin: 0;">2026</p>
</div>
</body>
</html>
