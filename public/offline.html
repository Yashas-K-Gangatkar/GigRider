<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigRider — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, 'Times New Roman', serif; background: #FFFBF0; color: #1B2A4A; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    .container { max-width: 400px; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #1B2A4A; }
    p { font-size: 0.9rem; color: #7A7168; line-height: 1.6; margin-bottom: 1.5rem; }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    .btn { display: inline-block; padding: 0.75rem 2rem; background: #1B2A4A; color: #FFFBF0; border: none; border-radius: 8px; font-family: Georgia, serif; font-size: 0.85rem; cursor: pointer; text-decoration: none; }
    .btn:hover { background: #2A3F6A; }
    .gold { color: #C9A84C; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're <span class="gold">Offline</span></h1>
    <p>GigRider requires an internet connection to fetch live delivery data. Please check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
